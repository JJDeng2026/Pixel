<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>火柴人战斗</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 加载覆盖层 -->
<div id="loadOverlay">
    <div class="load-content">
        <div class="load-spinner"></div>
        <p id="loadText">加载中...</p>
        <div class="load-bar"><div id="loadBar" class="load-bar-fill"></div></div>
    </div>
</div>

<!-- 主菜单 -->
<div id="mainMenu" class="screen">
    <div class="menu-content">
        <div class="game-title">火柴人战斗</div>
        <div class="game-subtitle">STICKMAN FIGHTER</div>

        <!-- 金币 & 等级 -->
        <div class="menu-stats">
            <span>💰 <span id="menuGold">0</span></span>
            <span>Lv.<span id="menuLevel">1</span></span>
            <span>武器: <span id="menuWeapon">剑</span></span>
        </div>

        <!-- 商店 -->
        <div class="menu-section">
            <div class="section-title">⚔️ 升级（提升攻击力+10%）</div>
            <button class="shop-btn" id="btnLevelUp" onclick="buyLevel()">升级 Lv.<span id="btnLevelLv">1</span> → Lv.<span id="btnLevelNext">2</span> · 💰<span id="btnLevelCost">50</span></button>
        </div>

        <div class="menu-section">
            <div class="section-title">选择武器</div>
            <div class="weapon-grid" id="weaponGrid"></div>
        </div>

        <div class="menu-section">
            <div class="section-title">武器技能（技能伤害+30%）</div>
            <div class="weapon-grid" id="weaponSkillGrid"></div>
        </div>

        <div class="menu-section">
            <div class="section-title">选择章节（每章5小关）</div>
            <div class="scene-grid" id="sceneGrid"></div>
        </div>

        <div class="menu-stats">
            <span>已解锁: 第<span id="menuMaxChapter">1</span>章</span>
            <span id="menuSubInfo">小关 1/5</span>
        </div>

        <button class="btn-start" onclick="startGame()">开始战斗</button>

        <div class="controls-hint">
            <p>PC: WASD 移动 | J 攻击 | K 跳跃 | L 技能</p>
            <p>移动端: 左摇杆移动 | 右按钮操作</p>
        </div>
    </div>
</div>

<!-- 游戏界面 -->
<div id="gameScreen" class="screen hidden">
    <canvas id="gameCanvas"></canvas>
</div>

<script src="js/game.js?v=3.0.0"></script>
</body>
</html>
