<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>亡灵骑士·夏侯惇</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 主菜单 -->
    <div id="mainMenu" class="screen">
        <div class="menu-bg"></div>
        <div class="menu-content">
            <div class="title-area">
                <h1 class="game-title">亡灵骑士</h1>
                <h2 class="game-subtitle">夏侯惇</h2>
                <p class="game-desc">幸存者风格 · 暗黑三国</p>
            </div>
            <div class="menu-stats">
                <div class="mstat"><span class="ms-label">最高分</span><span id="mHighScore">0</span></div>
                <div class="mstat"><span class="ms-label">金币</span><span id="mGold">0</span></div>
                <div class="mstat"><span class="ms-label">总击杀</span><span id="mTotalKills">0</span></div>
            </div>
            <div class="menu-btns">
                <button id="btnStart" class="btn-primary">开始战斗</button>
                <button id="btnUpgrade" class="btn-secondary">永久强化</button>
                <button id="btnGM" class="btn-gm">GM后台</button>
            </div>
        </div>
    </div>

    <!-- 游戏界面 -->
    <div id="gameScreen" class="screen hidden">
        <canvas id="gameCanvas"></canvas>
        <div class="game-hud">
            <div class="hud-top">
                <div class="hud-hp-bar"><div id="hpHpBar" class="hud-hp-fill"></div><span id="hpText">100/100</span></div>
                <div class="hud-xp-bar"><div id="hudXpBar" class="hud-xp-fill"></div><span>Lv.<span id="hudLevel">1</span></span></div>
            </div>
            <div class="hud-info">
                <span>T:<span id="hudTime">0:00</span></span>
                <span>K:<span id="hudKills">0</span></span>
                <span>S:<span id="hudScore">0</span></span>
            </div>
            <!-- 道具背包栏 -->
            <div class="item-bar" id="itemSlots"></div>
        </div>
        <div class="mobile-ctrl">
            <div class="joystick-zone" id="joystickZone">
                <div class="joystick-base" id="joystickBase">
                    <div class="joystick-knob" id="joystickKnob"></div>
                </div>
            </div>
            <button id="btnPause" class="btn-pause">||</button>
        </div>
    </div>

    <!-- 升级选择 -->
    <div id="levelUpScreen" class="overlay hidden">
        <div class="overlay-card">
            <h2 class="overlay-title">升级！选择强化</h2>
            <div id="levelUpOptions" class="options-grid"></div>
        </div>
    </div>

    <!-- 游戏结束 -->
    <div id="gameOverScreen" class="overlay hidden">
        <div class="overlay-card">
            <h2 class="overlay-title death-title">力竭而亡</h2>
            <div class="go-stats">
                <p>得分: <span id="goScore">0</span></p>
                <p>击杀: <span id="goKills">0</span></p>
                <p>存活: <span id="goTime">0:00</span></p>
                <p>等级: <span id="goLevel">1</span></p>
                <p class="go-reward">获得金币: +<span id="goGold">0</span></p>
            </div>
            <div class="go-btns">
                <button id="btnRestart" class="btn-primary">再来一局</button>
                <button id="btnMenu" class="btn-secondary">返回主菜单</button>
            </div>
        </div>
    </div>

    <!-- 暂停 -->
    <div id="pauseScreen" class="overlay hidden">
        <div class="overlay-card">
            <h2 class="overlay-title">暂停</h2>
            <div class="go-btns">
                <button id="btnResume" class="btn-primary">继续战斗</button>
                <button id="btnQuit" class="btn-secondary">返回主菜单</button>
            </div>
        </div>
    </div>

    <!-- 永久强化 -->
    <div id="upgradeScreen" class="overlay hidden">
        <div class="overlay-card wide-card">
            <h2 class="overlay-title">永久强化</h2>
            <p class="upgrade-gold">金币: <span id="upGold">0</span></p>
            <div id="upgradeList" class="upgrade-list"></div>
            <button id="btnCloseUpgrade" class="btn-close">关闭</button>
        </div>
    </div>

    <!-- GM后台 -->
    <div id="gmScreen" class="overlay hidden">
        <div class="overlay-card wide-card">
            <h2 class="overlay-title">GM后台</h2>
            <div class="gm-section">
                <div class="gm-row"><label>金币:</label><input id="gmGold" type="number"><button onclick="GM.setGold()">设置</button><button onclick="GM.addGold(99999)">+99999</button></div>
                <div class="gm-row"><button onclick="GM.resetAll()" class="btn-danger">重置所有数据</button><button onclick="GM.maxUpgrades()">满级强化</button><button onclick="GM.unlockAll()">解锁全部</button></div>
            </div>
            <button id="btnCloseGM" class="btn-close">关闭</button>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
