<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>像素肉鸽 - Pixel Roguelike</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="portrait-mode">
    <!-- 主菜单 -->
    <div id="mainMenu" class="menu-screen">
        <div class="menu-container">
            <h1 class="game-title">⚔️ 像素肉鸽 ⚔️</h1>
            <p class="game-subtitle">Pixel Roguelike Adventure</p>
            
            <div class="player-stats-preview">
                <div class="stat-item">
                    <span class="stat-icon">💰</span>
                    <span id="menuGold">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">💎</span>
                    <span id="menuDiamond">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">⭐</span>
                    <span>Lv.<span id="menuLevel">1</span></span>
                </div>
            </div>
            
            <div class="menu-buttons">
                <button id="startGameBtn" class="menu-btn primary-btn">🎮 开始游戏</button>
                <button id="shopBtn" class="menu-btn secondary-btn">🛒 商店</button>
                <button id="upgradeBtn" class="menu-btn secondary-btn">⬆️ 永久升级</button>
                <button id="gmBtn" class="menu-btn gm-btn">🔧 GM后台</button>
            </div>
            
            <div class="game-info">
                <p>最高积分: <span id="highScore">0</span></p>
                <p>总对局数: <span id="totalGames">0</span></p>
            </div>
        </div>
    </div>

    <!-- 游戏界面 -->
    <div id="gameScreen" class="game-screen hidden">
        <!-- 游戏HUD -->
        <div class="game-hud">
            <div class="hud-left">
                <div class="health-bar">
                    <span class="hud-label">❤️</span>
                    <div class="bar-container">
                        <div id="healthBar" class="bar-fill health-fill"></div>
                    </div>
                </div>
                <div class="exp-bar">
                    <span class="hud-label">⭐</span>
                    <div class="bar-container">
                        <div id="expBar" class="bar-fill exp-fill"></div>
                    </div>
                </div>
            </div>
            <div class="hud-right">
                <div class="hud-stat">⏱️ <span id="gameTime">0:00</span></div>
                <div class="hud-stat">💀 <span id="killCount">0</span></div>
                <div class="hud-stat">🏆 <span id="currentScore">0</span></div>
            </div>
        </div>
        
        <!-- 游戏画布 -->
        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>
        
        <!-- 移动端控制区域 -->
        <div class="mobile-controls">
            <!-- 左侧：虚拟摇杆 -->
            <div class="joystick-area">
                <div id="joystick" class="joystick">
                    <div id="joystickKnob" class="joystick-knob"></div>
                </div>
            </div>
            
            <!-- 右侧：技能按钮 -->
            <div class="skill-buttons-area">
                <div class="skill-row">
                    <button id="skillBtn1" class="skill-btn" data-skill="0">
                        <span class="skill-icon">🔥</span>
                        <span class="skill-cooldown"></span>
                    </button>
                    <button id="skillBtn2" class="skill-btn" data-skill="1">
                        <span class="skill-icon">⚡</span>
                        <span class="skill-cooldown"></span>
                    </button>
                </div>
                <div class="skill-row">
                    <button id="skillBtn3" class="skill-btn" data-skill="2">
                        <span class="skill-icon">❄️</span>
                        <span class="skill-cooldown"></span>
                    </button>
                    <button id="skillBtn4" class="skill-btn" data-skill="3">
                        <span class="skill-icon">🛡️</span>
                        <span class="skill-cooldown"></span>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 暂停按钮 -->
        <button id="pauseBtn" class="pause-btn">⏸️</button>
    </div>

    <!-- 升级选择界面 -->
    <div id="levelUpScreen" class="overlay-screen hidden">
        <div class="levelup-container">
            <h2 class="levelup-title">🎉 升级! 选择强化 🎉</h2>
            <div id="levelUpOptions" class="levelup-options">
                <!-- 动态生成选项 -->
            </div>
        </div>
    </div>

    <!-- 商店界面 -->
    <div id="shopScreen" class="overlay-screen hidden">
        <div class="shop-container">
            <h2 class="shop-title">🛒 商店</h2>
            <div class="shop-currency">
                <span>💰 金币: <span id="shopGold">0</span></span>
                <span>💎 钻石: <span id="shopDiamond">0</span></span>
            </div>
            <div id="shopItems" class="shop-items">
                <!-- 动态生成商品 -->
            </div>
            <button id="closeShopBtn" class="close-btn">✖ 关闭</button>
        </div>
    </div>

    <!-- 永久升级界面 -->
    <div id="upgradeScreen" class="overlay-screen hidden">
        <div class="upgrade-container">
            <h2 class="upgrade-title">⬆️ 永久升级 (对局外生效)</h2>
            <div class="upgrade-currency">
                <span>💰 金币: <span id="upgradeGold">0</span></span>
            </div>
            <div id="permanentUpgrades" class="upgrade-list">
                <!-- 动态生成升级项 -->
            </div>
            <button id="closeUpgradeBtn" class="close-btn">✖ 关闭</button>
        </div>
    </div>

    <!-- GM后台界面 -->
    <div id="gmScreen" class="overlay-screen hidden">
        <div class="gm-container">
            <h2 class="gm-title">🔧 GM管理后台</h2>
            <div class="gm-section">
                <h3>资源修改</h3>
                <div class="gm-controls">
                    <div class="gm-control">
                        <label>金币:</label>
                        <input type="number" id="gmGoldInput" value="0">
                        <button class="gm-btn" onclick="GM.setGold()">设置</button>
                        <button class="gm-btn add" onclick="GM.addGold(10000)">+10000</button>
                    </div>
                    <div class="gm-control">
                        <label>钻石:</label>
                        <input type="number" id="gmDiamondInput" value="0">
                        <button class="gm-btn" onclick="GM.setDiamond()">设置</button>
                        <button class="gm-btn add" onclick="GM.addDiamond(1000)">+1000</button>
                    </div>
                </div>
            </div>
            <div class="gm-section">
                <h3>数据操作</h3>
                <div class="gm-controls">
                    <button class="gm-btn warning" onclick="GM.resetData()">🔄 重置所有数据</button>
                    <button class="gm-btn" onclick="GM.exportData()">📤 导出存档</button>
                    <button class="gm-btn" onclick="GM.importData()">📥 导入存档</button>
                </div>
            </div>
            <div class="gm-section">
                <h3>游戏调试</h3>
                <div class="gm-controls">
                    <button class="gm-btn" onclick="GM.giveAllWeapons()">⚔️ 解锁所有武器</button>
                    <button class="gm-btn" onclick="GM.maxPermanentUpgrades()">⬆️ 满级永久升级</button>
                    <button class="gm-btn" onclick="GM.unlockAllSkins()">🎨 解锁所有皮肤</button>
                </div>
            </div>
            <button id="closeGmBtn" class="close-btn">✖ 关闭</button>
        </div>
    </div>

    <!-- 游戏结束界面 -->
    <div id="gameOverScreen" class="overlay-screen hidden">
        <div class="gameover-container">
            <h2 class="gameover-title">💀 游戏结束 💀</h2>
            <div class="gameover-stats">
                <p>🏆 本次积分: <span id="finalScore">0</span></p>
                <p>💀 击杀数: <span id="finalKills">0</span></p>
                <p>⏱️ 存活时间: <span id="finalTime">0:00</span></p>
                <p>📈 达到等级: <span id="finalLevel">1</span></p>
                <p class="reward-text">🎁 获得奖励:</p>
                <p>💰 +<span id="rewardGold">0</span> 金币</p>
                <p>💎 +<span id="rewardDiamond">0</span> 钻石</p>
            </div>
            <div class="gameover-buttons">
                <button id="restartBtn" class="menu-btn primary-btn">🔄 再来一局</button>
                <button id="backToMenuBtn" class="menu-btn secondary-btn">🏠 返回主菜单</button>
            </div>
        </div>
    </div>

    <!-- 暂停界面 -->
    <div id="pauseScreen" class="overlay-screen hidden">
        <div class="pause-container">
            <h2 class="pause-title">⏸️ 游戏暂停</h2>
            <div class="pause-buttons">
                <button id="resumeBtn" class="menu-btn primary-btn">▶️ 继续游戏</button>
                <button id="quitBtn" class="menu-btn secondary-btn">🏠 返回主菜单</button>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/config.js"></script>
    <script src="js/sprites.js"></script>
    <script src="js/database.js"></script>
    <script src="js/gameEngine.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/weapons.js"></script>
    <script src="js/shop.js"></script>
    <script src="js/gm.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
